<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>局域网文件共享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .upload-zone {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            border: 3px dashed #ddd;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-zone .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .upload-zone p {
            color: #666;
            font-size: 1.1rem;
        }

        .upload-zone input[type="file"] {
            display: none;
        }

        .upload-btn {
            margin-top: 15px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .upload-btn:hover {
            transform: scale(1.05);
        }

        .files-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
        }

        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .files-header h2 {
            color: #333;
        }

        .refresh-btn {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #5568d3;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #f8f9fa;
            transition: transform 0.2s;
        }

        .file-item:hover {
            transform: translateX(5px);
            background: #f0f1ff;
        }

        .file-icon {
            font-size: 2rem;
            margin-right: 15px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .file-meta {
            font-size: 0.85rem;
            color: #888;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #4CAF50;
        }

        .message.error {
            background: #f44336;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .file-icon {
                margin-bottom: 10px;
            }

            .file-actions {
                margin-top: 10px;
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 局域网文件共享</h1>
            <p>在局域网内轻松分享文件</p>
            <div id="qrContainer" style="margin-top: 20px; display: none;">
                <img id="qrcode" alt="扫码访问" style="width: 200px; height: 200px; border-radius: 10px; border: 5px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                <p style="color: white; margin-top: 10px; font-size: 0.9rem;">📱 用手机扫码访问</p>
            </div>
        </div>

        <div class="upload-zone" id="uploadZone">
            <div class="icon">📤</div>
            <p>拖拽文件到此处，或点击上传</p>
            <input type="file" id="fileInput">
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
        </div>

        <div class="files-section">
            <div class="files-header">
                <h2>文件列表</h2>
                <button class="refresh-btn" onclick="loadFiles()">🔄 刷新</button>
            </div>
            <div id="fileListContainer">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        // 拖拽上传
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                await uploadFile(files[0]);
            }
        });

        // 点击上传
        fileInput.addEventListener('change', async (e) => {
            if (e.target.files.length > 0) {
                await uploadFile(e.target.files[0]);
                fileInput.value = '';
            }
        });

        // 上传文件
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    showMessage('上传成功！', 'success');
                    loadFiles();
                } else {
                    showMessage('上传失败：' + result.error, 'error');
                }
            } catch (error) {
                showMessage('上传失败：' + error.message, 'error');
            }
        }

        // 加载文件列表
        async function loadFiles() {
            const container = document.getElementById('fileListContainer');

            try {
                const response = await fetch('/api/files');
                const result = await response.json();

                if (result.success) {
                    if (result.files.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="icon">📭</div>
                                <p>暂无文件</p>
                            </div>
                        `;
                    } else {
                        container.innerHTML = `
                            <ul class="file-list">
                                ${result.files.map(file => createFileItem(file)).join('')}
                            </ul>
                        `;
                    }
                }
            } catch (error) {
                container.innerHTML = `<div class="loading">加载失败：${error.message}</div>`;
            }
        }

        // 创建文件项
        function createFileItem(file) {
            const size = formatSize(file.size);
            const date = new Date(file.uploadTime).toLocaleString('zh-CN');

            return `
                <li class="file-item">
                    <div class="file-icon">📄</div>
                    <div class="file-info">
                        <div class="file-name">${file.originalName}</div>
                        <div class="file-meta">${size} · ${date}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-download" onclick="downloadFile('${file.name}')">⬇ 下载</button>
                        <button class="btn btn-delete" onclick="deleteFile('${file.name}')">🗑 删除</button>
                    </div>
                </li>
            `;
        }

        // 下载文件
        function downloadFile(filename) {
            window.location.href = `/api/download/${filename}`;
        }

        // 删除文件
        async function deleteFile(filename) {
            if (!confirm('确定要删除这个文件吗？')) return;

            try {
                const response = await fetch(`/api/delete/${filename}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.success) {
                    showMessage('删除成功！', 'success');
                    loadFiles();
                } else {
                    showMessage('删除失败：' + result.error, 'error');
                }
            } catch (error) {
                showMessage('删除失败：' + error.message, 'error');
            }
        }

        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // 显示消息
        function showMessage(text, type) {
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            document.body.appendChild(message);

            setTimeout(() => {
                message.remove();
            }, 3000);
        }

        // 初始加载
        loadFiles();

        // 加载二维码
        const qrImg = document.getElementById('qrcode');
        const qrContainer = document.getElementById('qrContainer');
        qrImg.onload = function() {
            qrContainer.style.display = 'block';
        };
        qrImg.onerror = function() {
            console.log('二维码图片加载失败');
        };
        qrImg.src = '/qrcode.png?' + Date.now(); // 防止缓存
    </script>
</body>
</html>
